<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — Locations</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="card admin-wrap">
    <div class="admin-header">
      <h1>📊 Location Submissions</h1>
      <div style="display:flex; align-items:center; gap:10px;">
        <span id="countBadge" class="count-badge">0 records</span>
        <button id="refreshBtn" class="btn-secondary">⟳ Refresh</button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Session ID</th>
            <th>Latitude</th>
            <th>Longitude</th>
            <th>Accuracy (m)</th>
            <th>Time Received</th>
            <th>Map</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- rows injected by admin.js -->
        </tbody>
      </table>
    </div>

    <div id="emptyState" class="empty-state" style="display:none;">
      No location submissions yet.
    </div>
  </main>

  <script src="/admin.js"></script>
</body>
</html>
